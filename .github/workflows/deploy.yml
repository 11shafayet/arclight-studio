name: Build Arclight Studio

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: arclightstudio-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run build

      - name: Copy Apache configuration
        run: |
          if [ -f public/.htaccess ]; then
            cp public/.htaccess dist/.htaccess
          fi

      - name: Publish build to deploy branch
        run: |
          mkdir -p /tmp/arclight-dist
          cp -a dist/. /tmp/arclight-dist/

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout --orphan deploy-temp

          git rm -rf . || true

          find . \
            -mindepth 1 \
            -maxdepth 1 \
            ! -name ".git" \
            -exec rm -rf {} +

          cp -a /tmp/arclight-dist/. .

          git add -A
          git commit -m "Deploy ${GITHUB_SHA}"
          git push --force origin HEAD:deploy